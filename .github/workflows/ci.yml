name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Move PDF to output directory
        run: |
          if [ -f "main.pdf" ]; then
            mkdir -p output
            mv main.pdf output/
          else
            echo "Error: PDF file not found. Please commit the generated PDF to the repository."
            exit 1
          fi

      - name: Upload PDF to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
